<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b1e"/>
      <stop offset="0.55" stop-color="#101637"/>
      <stop offset="1" stop-color="#0a1230"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#45e0c8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#45e0c8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2a55"/>
      <stop offset="1" stop-color="#0e1838"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#45e0c8"/>
      <stop offset="1" stop-color="#3ddc84"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- mycelium network: faint nodes + threads (top-right) -->
  <g stroke="#45e0c8" stroke-opacity="0.16" stroke-width="1.2" fill="none">
    <path d="M880 70 Q960 150 1040 110 T1150 180"/>
    <path d="M1020 60 Q1060 160 980 220 T1080 320"/>
    <path d="M900 140 Q1000 200 1100 150"/>
    <path d="M820 220 Q920 240 980 320"/>
    <path d="M1080 90 Q1120 200 1040 260"/>
  </g>
  <g fill="#45e0c8" fill-opacity="0.5">
    <circle cx="880" cy="70" r="3.5"/><circle cx="1040" cy="110" r="3"/>
    <circle cx="1150" cy="180" r="3"/><circle cx="1020" cy="60" r="3"/>
    <circle cx="980" cy="220" r="3.5"/><circle cx="1080" cy="320" r="3"/>
    <circle cx="900" cy="140" r="2.5"/><circle cx="1100" cy="150" r="3"/>
    <circle cx="820" cy="220" r="2.5"/><circle cx="1040" cy="260" r="3"/>
  </g>

  <!-- TEE enclave hexagon + lock -->
  <g transform="translate(175 315)">
    <polygon points="0,-118 102,-59 102,59 0,118 -102,59 -102,-59" fill="url(#hex)" stroke="url(#accent)" stroke-width="3"/>
    <polygon points="0,-86 74,-43 74,43 0,86 -74,43 -74,-43" fill="none" stroke="#45e0c8" stroke-opacity="0.30" stroke-width="1.5"/>
    <!-- lock shackle -->
    <path d="M-26 -18 v-16 a26 26 0 0 1 52 0 v16" fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round"/>
    <!-- lock body -->
    <rect x="-38" y="-18" width="76" height="60" rx="11" fill="#0c1838" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="0" cy="6" r="9" fill="#45e0c8"/>
    <rect x="-4" y="6" width="8" height="20" rx="4" fill="#45e0c8"/>
  </g>

  <!-- text block -->
  <g transform="translate(360 0)">
    <!-- ecosystem kicker -->
    <text x="0" y="186" fill="#8b93b8" font-size="22" letter-spacing="4" font-weight="600">MYCELIUM PROTOCOL · AASTAR</text>

    <!-- title -->
    <text x="-3" y="278" fill="#f5f7fa" font-size="92" font-weight="800" letter-spacing="-1">AirAccount KMS</text>

    <!-- Beta badge + version -->
    <g transform="translate(0 312)">
      <rect x="0" y="0" rx="20" width="232" height="48" fill="url(#accent)"/>
      <text x="116" y="33" fill="#06231d" font-size="25" font-weight="800" text-anchor="middle" letter-spacing="1">BETA3 · v0.21.0</text>
      <text x="252" y="33" fill="#aeb6d6" font-size="24" font-weight="500">Released · 2026-06-13</text>
    </g>

    <!-- subtitle -->
    <text x="0" y="416" fill="#c7cde6" font-size="30" font-weight="500">TEE Key Management · WebAuthn · AWS KMS Compatible</text>

    <!-- capability pills -->
    <g font-size="20" font-weight="600">
      <g transform="translate(0 452)">
        <rect width="244" height="44" rx="22" fill="#16203f" stroke="#2c3a66" stroke-width="1"/>
        <text x="122" y="28" fill="#45e0c8" text-anchor="middle">Replay-proof binding</text>
      </g>
      <g transform="translate(264 452)">
        <rect width="232" height="44" rx="22" fill="#16203f" stroke="#2c3a66" stroke-width="1"/>
        <text x="116" y="28" fill="#3ddc84" text-anchor="middle">No admin in release</text>
      </g>
      <g transform="translate(516 452)">
        <rect width="186" height="44" rx="22" fill="#16203f" stroke="#2c3a66" stroke-width="1"/>
        <text x="93" y="28" fill="#ffb454" text-anchor="middle">i.MX93 · 41/41 E2E</text>
      </g>
    </g>
  </g>

  <!-- footer line -->
  <text x="360" y="560" fill="#6a7299" font-size="20" font-weight="500">github.com/AAStarCommunity/AirAccount · Apache 2.0 · OP-TEE TrustZone</text>
</svg>
