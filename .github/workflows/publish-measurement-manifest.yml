# B-2 publish side (issue #87). RELEASE-TIME, manual — NOT runtime.
# After the measurement manifest is updated + signed (sign-manifest.mjs), this
# submits SHA-256(canonical body) to the Sigsum log, collects a policy-satisfying
# (witness-cosigned) proof, and commits the proof sidecar the host serves.
#
# Prereq secret: SIGSUM_SUBMIT_KEY = the Sigsum submitter private key (hex or the
# OpenSSH private key body). Policy is committed at kms/host/sigsum-policy.
name: Publish Measurement Manifest (Sigsum)

on:
  workflow_dispatch:
    inputs:
      open_pr:
        description: 'Open a PR with the refreshed proof sidecar (else commit to a branch)'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Submit manifest to Sigsum + commit proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install sigsum tools
        run: |
          go install sigsum.org/sigsum-go/cmd/sigsum-key@v0.11.1
          go install sigsum.org/sigsum-go/cmd/sigsum-submit@v0.11.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build attestation-verifier
        working-directory: packages/attestation-verifier
        run: |
          corepack enable
          pnpm install --frozen-lockfile || pnpm install
          pnpm build

      - name: Write submitter key
        run: |
          umask 077
          # Secret via env (not interpolated into the command line) — Codex hardening.
          printf '%s' "$SIGSUM_SUBMIT_KEY" > "$RUNNER_TEMP/submit"
        env:
          SIGSUM_SUBMIT_KEY: ${{ secrets.SIGSUM_SUBMIT_KEY }}

      - name: Submit to Sigsum + emit proof sidecar
        working-directory: packages/attestation-verifier
        # The submitter PUBLIC key (hex) is public — pass it directly so CI needs
        # no .pub derivation from the OpenSSH private key.
        run: |
          node scripts/submit-manifest-to-sigsum.mjs \
            --manifest ../../kms/host/attestation-measurements.json \
            --submit-key "$RUNNER_TEMP/submit" \
            --submitter-key-hex bfd67129aea84b940228dc3310d1c612ccf318f1100b0b965bda259139e27c27 \
            --policy ../../kms/host/sigsum-policy \
            --out ../../kms/host/attestation-measurements-proof.json

      - name: Verify the fresh proof before committing
        working-directory: packages/attestation-verifier
        run: |
          node scripts/monitor-manifest.mjs --local \
            --ref-manifest ../../kms/host/attestation-measurements.json \
            --ref-proof ../../kms/host/attestation-measurements-proof.json

      - name: Commit refreshed proof sidecar
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          branch="chore/refresh-transparency-proof-${{ github.run_id }}"
          git checkout -b "$branch"
          git add kms/host/attestation-measurements-proof.json
          git commit -m "chore(#87): refresh Sigsum transparency proof for the measurement manifest"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore(#87): refresh transparency proof" \
            --body "Auto-generated by the publish workflow after submitting the manifest to Sigsum."
        env:
          GH_TOKEN: ${{ github.token }}
