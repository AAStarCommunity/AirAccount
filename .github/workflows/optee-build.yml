name: OP-TEE Build and Test

on:
  push:
    branches: [ main, develop, KMS ]
  pull_request:
    branches: [ main, develop, KMS ]

jobs:
  # Full OP-TEE build requires the QEMU toolchain (see qemu/ directory).
  # This job checks what is verifiable on a plain ubuntu runner.
  build-test:
    name: Proto check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Check proto crate
      run: cargo check -p proto
      working-directory: kms/proto

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: clippy, rustfmt

    - name: Check code formatting
      # -p flag restricts to workspace packages only — does not touch third_party path deps
      run: cargo fmt -p kms -p proto -- --check
      working-directory: kms/host

    - name: Run Clippy (proto)
      # kms/host requires OP-TEE SDK to compile; only proto is checkable on ubuntu
      run: cargo clippy -p proto -- -D warnings
      working-directory: kms/proto

  security-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      # Run from workspace root so cargo-audit finds Cargo.lock
      run: cargo audit
      continue-on-error: true

    - name: Check for critical vulnerabilities
      run: |
        if cargo audit --json | grep -q '"kind":"vulnerability"'; then
          echo "Security vulnerabilities found — review before merging"
          cargo audit
        else
          echo "No known security vulnerabilities found."
        fi
      continue-on-error: true
