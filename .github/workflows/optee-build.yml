name: OP-TEE Build and Test

on:
  push:
    branches: [ main, develop, KMS ]
  pull_request:
    branches: [ main, develop, KMS ]

jobs:
  build-test:
    name: Build and Test (host, no TEE)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Cache Cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          kms/host/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build host (no TEE)
      run: cargo build --no-default-features
      working-directory: kms/host

    - name: Run unit tests (no TEE)
      run: cargo test --no-default-features
      working-directory: kms/host

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.sha }}
        path: kms/host/target/
        retention-days: 7

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: clippy, rustfmt

    - name: Check code formatting
      run: cargo fmt --all -- --check
      working-directory: kms/host

    - name: Run Clippy
      run: cargo clippy --all-targets --no-default-features -- -D warnings
      working-directory: kms/host

    - name: Check documentation
      run: cargo doc --no-deps --document-private-items --no-default-features
      working-directory: kms/host

  security-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit
      working-directory: kms/host

    - name: Check for vulnerabilities
      run: |
        if cargo audit --json | grep -q '"kind":"vulnerability"'; then
          echo "Security vulnerabilities found!"
          cargo audit
          exit 1
        else
          echo "No security vulnerabilities found."
        fi
      working-directory: kms/host
