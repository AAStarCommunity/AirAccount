<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AirAccount KMS API — v0.23.1 (Beta5)</title>
  <!-- Pinned swagger-ui-dist@5.32.6 with SRI integrity (supply-chain hardening) -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.32.6/swagger-ui.css"
        integrity="sha384-9Q2fpS+xeS4ffJy6CagnwoUl+4ldAYhOs9pgZuEKxypVModhmZFzeMlvVsAjf7uT"
        crossorigin="anonymous">
  <style>
    body { margin: 0; background: #fafafa; }
    .swagger-ui .topbar { display: none; }
    #hdr { background: linear-gradient(110deg,#070b1e,#101637); color: #f5f7fa;
           padding: 16px 28px; font-family: -apple-system,Segoe UI,Roboto,sans-serif; }
    #hdr h1 { margin: 0 0 4px; font-size: 20px; }
    #hdr .b { display:inline-block; background:#45e0c8; color:#06231d; font-weight:700;
              border-radius: 14px; padding: 2px 12px; font-size: 13px; margin-right: 8px; }
    #hdr small { color:#8b93b8; } #hdr a { color:#45e0c8; text-decoration:none; }
    #theme { position: fixed; top: 13px; right: 20px; z-index: 9999; background:#16203f;
             color:#f5f7fa; border:1px solid #2c3a66; border-radius:20px; padding:6px 13px;
             cursor:pointer; font-size:16px; line-height:1; }
    html.dark body { background:#0b1020; }
    html.dark #swagger-ui { filter: invert(0.92) hue-rotate(180deg); }
    html.dark #swagger-ui .microlight, html.dark #swagger-ui img { filter: invert(1) hue-rotate(180deg); }
  </style>
</head>
<body>
  <div id="hdr">
    <h1><span class="b">BETA5 · v0.23.1</span> AirAccount KMS API</h1>
    <small>TEE 私钥管理 · WebAuthn · AWS KMS 兼容 · 私钥永不出 TEE · 测试矩阵：<a href="../API-TEST-MATRIX.md">API-TEST-MATRIX.md</a></small>
  </div>
  <button id="theme" onclick="tgl()" title="切换 dark / light">🌙</button>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.32.6/swagger-ui-bundle.js"
          integrity="sha384-EYdOaiRwn44zNjrw+Tfs06qYz9BGQVo2f4/pLY5i7VorbjnZNhdplAbTBk8FXHUJ"
          crossorigin="anonymous"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: './openapi.yaml', dom_id: '#swagger-ui', deepLinking: true,
      defaultModelsExpandDepth: 1, docExpansion: 'list', tryItOutEnabled: true,
      presets: [SwaggerUIBundle.presets.apis]
    });
    function tgl(){var d=document.documentElement.classList.toggle('dark');
      document.getElementById('theme').textContent=d?'☀️':'🌙';
      localStorage.setItem('kms-theme',d?'dark':'light');}
    (function(){if(localStorage.getItem('kms-theme')==='dark'){
      document.documentElement.classList.add('dark');
      document.getElementById('theme').textContent='☀️';}})();
  </script>
</body>
</html>
