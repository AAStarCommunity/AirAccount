# cargo-deny configuration for AirAccount KMS
# https://embarkstudios.github.io/cargo-deny/

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]
# Confidence threshold for license detection (0.0 - 1.0)
confidence-threshold = 0.8

[bans]
# Deny duplicate versions of the same crate
multiple-versions = "warn"

[advisories]
# Path to the local advisory database — uses the fetched one by default
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
