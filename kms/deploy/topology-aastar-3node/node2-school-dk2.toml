# node2 · 学校机房 DK2 · DVT2（独立，无 KMS）
# ⚠️⚠️ 硬件与 MX93 不同架构 —— STM32MP157F-DK2：ARMv7-A 32-bit（Cortex-A7）· 512MB DDR3L · 板载 WiFi。
#   - DVT node 必须 linux-armv7l（不是 arm64）。deploy-dvt.sh 现在硬编码 linux-arm64（第60-65行）
#     → 推 arm64 到 DK2 会 `Exec format error`。需 DVT 侧出 armv7 部署脚本（见 goutou @repo:dvt）。
#   - 512MB RAM 是约束（MX93 是 2GB）：单 DVT 可行但紧，建议 zram/swap + node --max-old-space-size≈256。
#   - 网络：现在只 USB-Eth 192.168.7.2；目标用板载 WiFi + tunnel 自己接入（同 kms1 方案）。WiFi 凭据见
#     gitignored .env.dk2-node2（不进 github）。
# BLS 私钥 = 本地 EIP-2335 加密 keystore（独立模式，RUST_SIGNER_URL 不设）。
# ⚠️ DVT-only 节点：现有 deploy-dvt.sh 假设 KMS co-located，DVT-only 走 runbook 独立模式。

[community]
name      = "aastar"
domain    = "dvt2.aastar.io"                # DVT2 公网 URL（可选；node 间用 libp2p/直连）
board_ssh = "root@TODO_TAILSCALE_IP"        # ⚠️ 到货后填
ssh_key   = "~/.ssh/id_ed25519"

# node2 不跑 KMS —— [kms] 段留空占位，DVT-only 部署忽略。
[kms]
version = ""
port    = 0
rp_id   = ""
origin  = ""
profile = "none"

[dvt]
version        = "1.9.0"
port           = 8080
node_name      = "aastar-dvt-2"
policy_enabled = false
kdf            = "pbkdf2"
# 独立模式：RUST_SIGNER_URL 不设 → DVT 用本地 EIP-2335 keystore。
# NODE_KEY_PASSPHRASE 手动输入 → tmpfs（断电重启需 dvt-unlock.sh 重输）。

[chain]
chain_id    = 11155111
eth_rpc_url = "https://eth-sepolia.g.alchemy.com/v2/<KEY>"
entry_point = "0x0000000071727De22E5E9d8BAf0edAc6f37da032"

[contracts]
active = "testnet"

[contracts_testnet]
validator       = "0x539B9681aFd5BFbCaa655Fe4c6BdcFe1fa7864bC"
e2e_account     = "0x92EA8b02D34A4D5d10f0Db9Ea894e8bC72e292e8"
policy_registry = ""

[contracts_mainnet]
validator       = ""                        # ⚠️ 生产合约部署后填
e2e_account     = ""
policy_registry = ""

[runtime]
node_version = "v20.20.2"
node_arch    = "armv7l"                      # ⚠️ DK2 是 32-bit ARMv7；deploy-dvt.sh 需按此选 node 下载 URL
node_dir     = "/opt/node20"
dvt_dir      = "/opt/dvt-build"

[secrets]
# NODE_KEY_PASSPHRASE —— DVT2 BLS keystore 解密密码（tmpfs，绝不落盘）
# ETH_PRIVATE_KEY     —— dvt-2 operator EOA（付 gas + registerBLSPublicKey）
# WiFi 凭据（SSID/PSK/MAC）—— 见 gitignored .env.dk2-node2，部署时 provision wpa_supplicant，不进 github
